name: Release and Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest
    if: startsWith(github.event.head_commit.message, 'Release ')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(echo "$COMMIT_MSG" | head -1 | sed 's/^Release //')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        run: |
          python3 << 'PYEOF' > release_notes.txt
          lines = []
          capturing = False
          with open('CHANGELOG.md') as f:
              for line in f:
                  line = line.rstrip('\n')
                  if line.startswith('## ['):
                      if capturing:
                          break
                      capturing = True
                  if capturing:
                      lines.append(line)
          print('\n'.join(lines).strip())
          PYEOF

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release_notes.txt

  docs:
    runs-on: macos-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Build documentation
        run: |
          xcodebuild docbuild \
            -scheme VoltCheckout \
            -destination "generic/platform=iOS" \
            -derivedDataPath .build/docc \
            -skipMacroValidation

          DOCCARCHIVE=$(find .build/docc -name "VoltCheckout.doccarchive" | head -1)

          $(xcrun --find docc) process-archive \
            transform-for-static-hosting "$DOCCARCHIVE" \
            --hosting-base-path checkout-ios-sdk \
            --output-path docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
